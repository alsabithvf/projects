<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #container{
            background: white;
            padding: 25px;
            border-radius: 10px;
            border: 2px solid #333;
            width: 350px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-group button{
            flex: 1;
        }

        h1{
            margin-bottom: 15px;
        }

        input{
            padding: 10px;
            width: 100%;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
            box-sizing: border-box;
        }

        #btn-group{
            display: flex;               
            justify-content: center;
            gap: 10px;
            margin-top: 10px;

        }

        #input-group{
            margin-bottom: 10px;
        }

        button{
            padding: 8px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
            transition: 0.3s;
        }

        #addBtn{
            background: #28a745;
        }

        #display{
            background: #007bff;
        }

        #clearBtn{
            background: #dc3545;
        }

        button:hover{
            opacity: 0.8;
        }

        ul{
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }

        li{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        li button{
            flex: none; 
            width: auto;
            background: #dc3545;
            padding: 5px 10px;
        }

        li button:hover{
            background: #c82333;
        }
    </style>
</head>
<body>
<div id="container">
    <h1>To Do App</h1>
    <div id="input-group">
    Enter the lists:<br><br><input type="text" id="text" placeholder="Enter task"><br><br>
    </div>
    <div id="btn-group">
    <button id="addBtn">Add</button>
    <button id="display">Display</button>
    <button id="clearBtn">Remove All</button>
    </div>
    <ul id="list"></ul>
</div>
<script>
    let text = document.getElementById("text");
    let addBtn = document.getElementById("addBtn");
    let clearBtn = document.getElementById("clearBtn");
    let display = document.getElementById("display");
    let list = document.getElementById("list");

    let tasks=[];

    addBtn.addEventListener("click",function(){
        let value = text.value;

        if(value == ""){
            alert("please enter a list");
            return;
        }
        tasks.push(value);

        text.value = "";
    });

    function displayTasks(){
        list.innerHTML="";

        if(tasks.length===0){
            list.innerHTML="";
            return;
        }

        for(let i=0;i<tasks.length;i++){

            let li = document.createElement("li");
            li.textContent = tasks[i];

            li.addEventListener("click", function(){
                li.style.textDecoration = "line-through";
            });

            let delBtn = document.createElement("button");
            delBtn.textContent= "Delete";

            delBtn.addEventListener("click",function(e){
                e.stopPropagation();
                tasks.splice(i,1);
                displayTasks();
            });

            li.appendChild(delBtn);
            list.appendChild(li);
        }
    }

    display.addEventListener("click",function(){
        if(tasks.length === 0){
        alert("there is no list to display!");
        return;
    }
    displayTasks();
    });

    clearBtn.addEventListener("click",function(){

        if(tasks.length===0){
            alert("there is no list to remove!");
            return;
        }

        tasks=[];
        list.innerHTML= "";
    });

</script>

</body>
</html>
